name: Scraper Infrastructure (CDK)

on:
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/scraper-infra.yml"
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/scraper-infra.yml"
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  AWS_ACCOUNT_ID: "309913069147"

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # -------------------------------------------------------------------
  # PR Check — run cdk diff and post output as a PR comment
  # -------------------------------------------------------------------
  diff:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-scraper-deploy
          role-session-name: GitHubActions-ScraperInfraDiff
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK diff
        id: cdk-diff
        working-directory: infra
        env:
          SCRAPER_CALLBACK_SECRET: ${{ secrets.SCRAPER_CALLBACK_SECRET }}
          SCRAPER_CALLBACK_URL: ${{ secrets.SCRAPER_CALLBACK_URL }}
        run: |
          set +e
          DIFF_OUTPUT=$(npx cdk diff 2>&1)
          EXIT_CODE=$?
          set -e

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          # Write diff output to a file for the comment step
          echo "$DIFF_OUTPUT" > /tmp/cdk-diff-output.txt

          # Also print to logs
          echo "$DIFF_OUTPUT"

          # Exit 0 even if diff found changes (exit code 1 means changes detected)
          if [ $EXIT_CODE -gt 1 ]; then
            exit $EXIT_CODE
          fi

      - name: Comment diff on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diffOutput = fs.readFileSync('/tmp/cdk-diff-output.txt', 'utf8');
            const exitCode = '${{ steps.cdk-diff.outputs.exit_code }}';
            const statusEmoji = exitCode === '0' ? 'No changes' : 'Changes detected';

            const body = `### CDK Diff — ${statusEmoji}

            \`\`\`
            ${diffOutput}
            \`\`\`

            _Generated by [scraper-infra.yml](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})_`;

            // Find existing bot comment to update (avoid spam)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes('### CDK Diff')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # -------------------------------------------------------------------
  # Deploy — run cdk deploy on push to main or manual dispatch
  # -------------------------------------------------------------------
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-scraper-deploy
          role-session-name: GitHubActions-ScraperInfraDeploy
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK deploy
        working-directory: infra
        env:
          SCRAPER_CALLBACK_SECRET: ${{ secrets.SCRAPER_CALLBACK_SECRET }}
          SCRAPER_CALLBACK_URL: ${{ secrets.SCRAPER_CALLBACK_URL }}
        run: npx cdk deploy --require-approval never
